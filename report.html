<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DATA NHẬP XUẤT</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>

/* ======================
   BODY
====================== */

body{
font-family:Arial;
padding:10px;
background:#f5f5f5;
}


/* ======================
   LOGIN
====================== */

#loginPage{
max-width:350px;
margin:auto;
margin-top:120px;
}

.loginBox{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
text-align:center;
}

.loginBox input{
width:90%;
padding:8px;
margin:6px;
}

.loginBox button{
padding:8px 16px;
margin-top:8px;
background:#0984e3;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.loginBox button:hover{
background:#0864b1;
}


/* ======================
   BOX
====================== */

.box{
background:white;
padding:10px;
margin-bottom:10px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.15);
}


/* ======================
   HEADER FIXED
====================== */

.headerFixed{
position:sticky;
top:0;
z-index:999;
background:#f5f5f5;
padding-bottom:5px;
}


/* ======================
   TABLE
====================== */

.tableWrap{
max-height:70vh;
overflow-y:auto;
}

.tableWrap th{
position:sticky;
top:0;
background:white;
z-index:5;
}

table{
border-collapse:collapse;
width:100%;
}

th,td{
border:1px solid #ccc;
padding:6px;
text-align:center;
}

tr:nth-child(even){
background:#fafafa;
}


/* ======================
   TAB
====================== */

.tab{
display:none;
}

.tab.active{
display:block;
}

.tabBtn{
padding:8px 16px;
margin:5px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
background:#dfe6e9;
}

.tabBtn.active{
background:#0984e3;
color:white;
}


/* ======================
   LOADING
====================== */

.loading{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#fdcb6e;
padding:15px 25px;
border-radius:10px;
font-weight:bold;
display:none;
}

</style>

</head>

<body>

<!-- ======================
       LOGIN
====================== -->

<div id="loginPage">

<div class="loginBox">

<h2>🔐 Đăng nhập</h2>

<input id="username"
placeholder="Tên đăng nhập">

<input id="password"
type="password"
placeholder="Mật khẩu">

<br>

<button onclick="login()">
Đăng nhập
</button>

</div>

</div>


<!-- ======================
       MAIN APP
====================== -->

<div id="mainApp" style="display:none;">


<div class="headerFixed box">

<button class="tabBtn"
onclick="showTab('nhap',this)">
📥 Dữ liệu nhập
</button>

<button class="tabBtn"
onclick="showTab('xuat',this)">
📤 Dữ liệu xuất
</button>

<button class="tabBtn"
onclick="showTab('ton',this)">
📦 Tồn
</button>

<button onclick="loadAllData()">
🔄 Load dữ liệu
</button>

<button onclick="logout()">
🚪 Logout
</button>

</div>


<div id="loading" class="loading">
⏳ Đang load dữ liệu...
</div>


<!-- ======================
       TAB NHẬP
====================== -->

<div id="nhap" class="tab">

<div class="box">

<h2>📥 DATA NHẬP</h2>

<button onclick="downloadExcel(dataNhap,'DATA_NHAP')">
⬇️ Tải Excel
</button>

<h3 id="totalNhap">
Tổng thùng: 0
</h3>

<div class="tableWrap">
<table id="tableNhap"></table>
</div>

</div>

</div>


<!-- ======================
       TAB XUẤT
====================== -->

<div id="xuat" class="tab">

<div class="box">

<h2>📤 DATA XUẤT</h2>
<button onclick="downloadExcel(dataXuat,'DATA_XUAT')">
⬇️ Tải Excel
</button>

<h3 id="totalXuat">
Tổng thùng: 0
</h3>

<div class="tableWrap">
<table id="tableXuat"></table>
</div>

</div>

</div>

</div>

<!-- ======================
       TAB TỒN
====================== -->

<div id="ton" class="tab">

<div class="box">

<h2>📦 HÀNG TỒN</h2>
<div class="box">
<h3>📊 THỐNG KÊ THÙNG</h3>
<table id="statTable"></table>
</div>

<button onclick="downloadExcel(getTonData(),'DATA_TON')">
⬇️ Tải Excel
</button>
<h3 id="totalTon">
Tổng thùng tồn: 0
</h3>

<div class="tableWrap">
<table id="tableTon"></table>
</div>

</div>

</div>
</div>

<script>

// ======================
// USERS LOGIN
// ======================

let users=[

{
username:"admin",
password:"123456"
},

{
username:"user",
password:"123456"
}

];


// ======================
// LOGIN
// ======================

function login(){

let u=
document.getElementById("username").value;

let p=
document.getElementById("password").value;

let found=
users.find(x=>
x.username===u &&
x.password===p
);

if(!found){

alert("Sai tài khoản!");

return;

}

document.getElementById("loginPage")
.style.display="none";

document.getElementById("mainApp")
.style.display="block";

showTab(
"nhap",
document.querySelector(".tabBtn")
);
loadAllData();
}

// ======================
// TÍNH HÀNG TỒN
// ======================

function renderTon(){

// lấy danh sách ID đã xuất

let exportedIDs =
new Set(dataXuat.map(x=>x.id));


// lọc ID chưa xuất

let tonData =
dataNhap.filter(x=>
!exportedIDs.has(x.id)
);


// render bảng tồn

renderTable(
tonData,
"tableTon",
"totalTon"
);
renderStats(tonData);
}
function getTonData(){

let exportedIDs =
new Set(dataXuat.map(x=>x.id));

return dataNhap.filter(x=>
!exportedIDs.has(x.id)
);

}
// ======================
// LOGOUT
// ======================

function logout(){

location.reload();

}


// ======================
// API
// ======================

const API_URL =
"https://script.google.com/macros/s/AKfycby5O2TPtSJi8meNJ2ilpgS9TKYHa2ZCbygAAAE277GNStGXdlXqn8gO5GyiY8ZMF5hSeQ/exec";

let dataNhap=[];
let dataXuat=[];


// ======================
// TAB
// ======================

function showTab(name,btn){

document.querySelectorAll(".tab")
.forEach(t=>t.classList.remove("active"));

document.getElementById(name)
.classList.add("active");

document.querySelectorAll(".tabBtn")
.forEach(b=>b.classList.remove("active"));

btn.classList.add("active");

}


// ======================
// LOAD DATA
// ======================

async function loadAllData(){

let loading=
document.getElementById("loading");

loading.style.display="block";

try{

// LOAD NHẬP

let resNhap =
await fetch(API_URL+"?type=NHAP");

dataNhap =
await resNhap.json();

renderTable(
dataNhap,
"tableNhap",
"totalNhap"
);


// LOAD XUẤT

let resXuat =
await fetch(API_URL+"?type=XUAT");

dataXuat =
await resXuat.json();

renderTable(
dataXuat,
"tableXuat",
"totalXuat"
);


// ⭐ QUAN TRỌNG: đặt ở đây

renderTon();


loading.innerText = "✅ Đã load xong";

setTimeout(()=>{
loading.style.display="none";
loading.innerText = "⏳ Đang load dữ liệu...";
},1500);

}
catch(err){

loading.style.display="none";

alert("❌ Lỗi load dữ liệu");

console.log(err);

}

}

function renderStats(data){

// đếm số dòng mỗi ID
let idCount = {};
data.forEach(row=>{
idCount[row.id] = (idCount[row.id] || 0) + 1;
});

// lấy ID unique
let uniqueMap = new Map();
data.forEach(row=>{
if(!uniqueMap.has(row.id)){
uniqueMap.set(row.id,row);
}
});

let stats = {
CHINA:0,
VIETNAM:0,
KOREA:0,
"MIX SIZE":0
};

// duyệt từng ID
uniqueMap.forEach(row=>{

let note = (row.note || "").toUpperCase().trim();

// 🔥 ƯU TIÊN MIX TRƯỚC
if(idCount[row.id] > 1){
stats["MIX SIZE"]++;
return;
}

// 👇 nếu không phải mix thì mới xét NOTE
if(note === ""){
stats["KOREA"]++;
}
else if(note.includes("CHINA")){
stats["CHINA"]++;
}
else if(note.includes("VIET")){
stats["VIETNAM"]++;
}
else{
stats[note] = (stats[note] || 0) + 1;
}

});

// tổng
let total = Object.values(stats).reduce((a,b)=>a+b,0);

// render
let table = document.getElementById("statTable");
table.innerHTML="";

let header = table.insertRow();
["CHINA","VIETNAM","KOREA","MIX SIZE","TOTAL"].forEach(c=>{
let th=document.createElement("th");
th.innerText=c;
header.appendChild(th);
});

let row = table.insertRow();

row.insertCell().innerText = stats["CHINA"]||0;
row.insertCell().innerText = stats["VIETNAM"]||0;
row.insertCell().innerText = stats["KOREA"]||0;
row.insertCell().innerText = stats["MIX SIZE"]||0;
row.insertCell().innerText = total;

}
// ======================
// RENDER TABLE
// ======================

function renderTable(data,tableID,totalID){

let table=
document.getElementById(tableID);

table.innerHTML="";

if(data.length===0)
return;


// HEADER

let header=table.insertRow();

let cols=[

"STT",
"NOTE",
"ID",
"TÊN",
"MÃ",

"80","90","100",
"110","120","130",
"140","150","160","170",

"KG",
"SỐ THÙNG",
"NGÀY"

];

cols.forEach(c=>{

let th=document.createElement("th");

th.innerText=c;

header.appendChild(th);

});

// DATA

let idCount = {};
data.forEach(row=>{
idCount[row.id] = (idCount[row.id] || 0) + 1;
});

let renderedID = new Set();
let renderedThung = new Set(); 

data.forEach((row,index)=>{

let tr=table.insertRow();

tr.insertCell().innerText=index+1;
tr.insertCell().innerText=row.note || "";

// ID merge
if(!renderedID.has(row.id)){
let tdID = document.createElement("td");
tdID.innerText = row.id;
tdID.rowSpan = idCount[row.id];
tr.appendChild(tdID);
renderedID.add(row.id);
}

tr.insertCell().innerText=row.ten;
tr.insertCell().innerText=row.ma;

// size...
let sizes=row.sizes||{};
["80","90","100","110","120","130","140","150","160","170"]
.forEach(s=>{
let val=sizes[s];
tr.insertCell().innerText=(val==0||val==null)?"":val;
});

tr.insertCell().innerText=row.kg;

// SỐ THÙNG merge
if(!renderedThung.has(row.id)){
let td = document.createElement("td");
td.innerText = 1;
td.rowSpan = idCount[row.id];
tr.appendChild(td);
renderedThung.add(row.id);
}

tr.insertCell().innerText=row.date;

});

// ======================
// TÍNH TỔNG THÙNG
// ======================

let uniqueIDs =
[...new Set(data.map(x => x.id))];

document.getElementById(totalID)
.innerText=
"Tổng thùng: "
+ uniqueIDs.length;

}

function downloadExcel(data, fileName){

if(!data || data.length===0){
alert("Không có dữ liệu!");
return;
}

let rows = data.map((row,index)=>{

let sizes=row.sizes||{};

return {
STT: index+1,
NOTE: row.note || "",
ID: row.id,
TEN: row.ten,
MA: row.ma,

"80": sizes["80"]||"",
"90": sizes["90"]||"",
"100": sizes["100"]||"",
"110": sizes["110"]||"",
"120": sizes["120"]||"",
"130": sizes["130"]||"",
"140": sizes["140"]||"",
"150": sizes["150"]||"",
"160": sizes["160"]||"",
"170": sizes["170"]||"",

KG: row.kg,
NGAY: row.date
};

});

let ws = XLSX.utils.json_to_sheet(rows, {
header: [
"STT","NOTE","ID","TEN","MA",
"80","90","100","110","120","130","140","150","160","170",
"KG","NGAY"
]
});
let wb = XLSX.utils.book_new();

XLSX.utils.book_append_sheet(wb, ws, "DATA");

XLSX.writeFile(wb, fileName + ".xlsx");

}
</script>

</body>
</html>
