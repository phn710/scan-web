<script>

function showMessage(msg){

let box=document.getElementById("scanMessage");

box.innerText=msg;

box.style.display="block";

setTimeout(()=>{
box.style.display="none";
},1200);

}

// ============================
// CONFIG
// ============================

const SIZES=[
"80","90","100",
"110","120","130",
"140","150","160","170"
];

let DATA=
JSON.parse(
localStorage.getItem("DATA_MASTER")
|| "{}"
);

let data=
JSON.parse(
localStorage.getItem("DATA_SCAN")
|| "[]"
);

let dataNhap=
JSON.parse(
localStorage.getItem("DATA_NHAP")
|| "[]"
);

let exportedData=
JSON.parse(
localStorage.getItem("DATA_EXPORTED")
|| "[]"
);

// ===== FILTER BIẾN TOÀN CỤC =====

let filterID="";
let filterTEN="";
let filterMA="";

let importedData=
JSON.parse(
localStorage.getItem("DATA_IMPORTED")
|| "[]"
);

let sheetNhapData=[];

let users=
JSON.parse(
localStorage.getItem("USERS")
||
'[{"username":"admin","password":"123456","role":"admin"}]'
);

let currentUser=null;


// ============================
// GOOGLE SHEET
// ============================

async function sendToGoogleSheet(row){

await fetch(
"https://script.google.com/macros/s/AKfycby5O2TPtSJi8meNJ2ilpgS9TKYHa2ZCbygAAAE277GNStGXdlXqn8gO5GyiY8ZMF5hSeQ/exec",
{

method:"POST",

mode:"no-cors",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(row)

});

}
// ============================
// LOGIN
// ============================

function login(){

let u=
document.getElementById("username").value;

let p=
document.getElementById("password").value;

let found=
users.find(x=>
x.username===u &&
x.password===p
);

if(!found){

alert("Sai tài khoản!");

return;

}

currentUser=found;

loadDataMaster();

document.getElementById("loginPage").style.display="none";

document.getElementById("mainApp").style.display="block";

if(found.role!=="admin"){

document.getElementById("importSection").style.display="none";

}

showTab(
"nhap",
document.querySelector(
".tabBtn[onclick=\"showTab('nhap',this)\"]"
)
);

render();

renderNhap();

renderUsers();

loadSheetNhap();

// renderImport để sau cùng
setTimeout(()=>{

renderImport();

},500);

document.getElementById("qrInputNhap").focus();

}


// ============================
// LOGOUT
// ============================

function logout(){

location.reload();

}


// ============================
// TAB
// ============================

function showTab(name,btn){

// đổi tab nội dung

document.querySelectorAll(".tab")
.forEach(t=>t.classList.remove("active"));

document.getElementById(name)
.classList.add("active");


// đổi màu nút tab

document.querySelectorAll(".tabBtn")
.forEach(b=>b.classList.remove("active"));

if(btn){

btn.classList.add("active");

}


// nếu tab export thì render


if(name==="exportList"){

loadSheetNhap();

}

if(name==="dataMaster"){

renderDataMaster();

}
}

// ============================
// IMPORT EXCEL
// ============================

function importExcel(){

let file=
document.getElementById("fileInput").files[0];

if(!file){

alert("Chọn file!");

return;

}

let reader=new FileReader();

reader.onload=function(e){

let wb=
XLSX.read(e.target.result,{type:'array'});

let sheet=
wb.Sheets[wb.SheetNames[0]];

let json=
XLSX.utils.sheet_to_json(sheet);

json.forEach(row=>{

let id=(row["ID"] || row["ID "] || "").toString().trim();

if(!id) return;

let sizes={};

SIZES.forEach(s=>{

sizes[s]=Number(row[s]||0);

});

if(!DATA[id]){

DATA[id]=[];

}

DATA[id].push({

ten:row["TEN"],

ma:row["MA"],

sizes:sizes,

kg:Number(row["KG"]||0)

});

});

localStorage.setItem(
"DATA_MASTER",
JSON.stringify(DATA)
);

alert("Import OK");

};

reader.readAsArrayBuffer(file);

}

// ======================
// SCAN XUẤT
// ======================

document.addEventListener("keypress",function(e){

if(e.key==="Enter"){

let input=document.getElementById("qrInput");

if(document.activeElement!==input) return;

let value=input.value.trim();

// ⭐ load lại exportedData mới nhất

exportedData =
JSON.parse(
localStorage.getItem("DATA_EXPORTED")
|| "[]"
);

// ❌ CHẶN ID ĐÃ XUẤT

if(exportedData.find(x=>x.id===value)){

showMessage("❌ ID đã xuất rồi");

input.value="";
return;

}

if(!value) return;

if(data.find(x=>x.id===value)){

showMessage("❌ Trùng ID");

input.value="";
return;

}

if(!DATA[value]){

showMessage("❌ Không có DATA");

input.value="";
return;

}

// ❌ KHÔNG CÓ TRONG LIST XUẤT CONT

if(!sheetNhapData.some(x=>x.id===value)){

showMessage("❌ ID không có trong list xuất cont");

input.value="";
return;

}

let lastID=value;

DATA[value].forEach(d=>{

let item={

id:value,

ten:d.ten,

ma:d.ma,

sizes:d.sizes,

kg:d.kg,

date:new Date()

};

data.push(item);

});

save();

render(lastID);

input.value="";
input.focus();

}

});

// ==========================
// SCAN NHAP
// ==========================

document.addEventListener("keypress",function(e){

if(e.key==="Enter"){

let input=document.getElementById("qrInputNhap");

if(document.activeElement!==input) return;

let value=input.value.trim();

if(!value) return;

// kiểm tra đã nhập rồi (trong dữ liệu chính)

if(importedData.find(x=>x.id===value)){

showMessage("❌ ID đã nhập");

input.value="";
input.focus();
return;

}

// kiểm tra trùng trong danh sách đang scan

if(dataNhap.find(x=>x.id===value)){

showMessage("❌ ID đã scan nhập rồi");

input.value="";
return;

}
// kiểm tra có trong DATA MASTER

if(!DATA[value]){

showMessage("❌ Không có ID trong DATA");

input.value="";
return;

}

// tạo item nhập

DATA[value].forEach(d=>{

let item={

id:value,

ten:d.ten,

ma:d.ma,

sizes:d.sizes,

kg:d.kg,

date:new Date()

};

dataNhap.push(item);

});


// lưu

saveNhap();

// hiển thị

renderNhap();

// reset input

input.value="";
input.focus();

}

});


// ============================
// SAVE
// ============================

function save(){

localStorage.setItem(
"DATA_SCAN",
JSON.stringify(data)
);

}

function saveNhap(){

localStorage.setItem(
"DATA_NHAP",
JSON.stringify(dataNhap)
);

}

// ============================
// SEARCH
// ============================

function searchID(){

let key=
document.getElementById("searchBox")
.value.toLowerCase();

let filtered=
data.filter(x=>
x.id.toString().toLowerCase().includes(key)
);

render(null,filtered);

}


// ============================
// RENDER LIST
// ============================

function render(highlightID,renderData){

let table=document.getElementById("list");

table.innerHTML="";

let header=table.insertRow();

// HEADER

[
"STT",
"ID",
"TEN",
"MA",

"80","90","100",
"110","120","130",
"140","150","160","170",

"KG",
"TIME",
"XUẤT"

]

.forEach(h=>{

let th=document.createElement("th");

th.innerText=h;

header.appendChild(th);

});

(renderData||data)
.forEach((item,index)=>{

let row=table.insertRow();

if(item.id===highlightID){

row.classList.add("newRow");

}

// STT
row.insertCell().innerText=index+1;

// ID
row.insertCell().innerText=item.id;

// TEN
row.insertCell().innerText=item.ten;

// ⭐ MA (cột bị thiếu của m)
row.insertCell().innerText=item.ma;

// SIZE

SIZES.forEach(s=>{

let val=item.sizes?.[s];

row.insertCell().innerText =
(val===0 || val===undefined) ? "" : val;

});

// KG
row.insertCell().innerText=item.kg;

// TIME
row.insertCell().innerText=
new Date(item.date)
.toLocaleString();

// XUẤT
row.insertCell().innerText="";

});

// ===== TỔNG THÙNG =====

let list = renderData || data;

let uniqueIDs = [...new Set(list.map(x => x.id))];

document.getElementById("totalKG")
.innerText = "Tổng thùng: " + uniqueIDs.length;

}
// ============================
// EXPORT TABLE
// ============================
function renderExport(renderData){

let table=
document.getElementById("exportTable");

table.innerHTML="";

let header=table.insertRow();

[
"STT",
"ID",
"TEN",
"MA",
"80","90","100",
"110","120","130",
"140","150","160","170",
"KG",
"NGÀY",
"XÓA"
]

.forEach(h=>{

let th=document.createElement("th");

th.innerText=h;

header.appendChild(th);

});

(renderData||exportedData)

.forEach((item,index)=>{

let row=table.insertRow();

row.insertCell().innerText=index+1;

row.insertCell().innerText=item.id;

row.insertCell().innerText=item.ten;

row.insertCell().innerText=item.ma;

SIZES.forEach(s=>{

let val=item.sizes?.[s];

row.insertCell().innerText =
(val===0 || val===undefined) ? "" : val;

});

row.insertCell().innerText=item.kg;

row.insertCell().innerText=
new Date(item.date)
.toLocaleDateString("en-US");

let delCell=row.insertCell();

if(currentUser && currentUser.role==="admin"){

let btn=document.createElement("button");

btn.innerText="❌";

btn.onclick=function(){

if(confirm("Xoá toàn bộ ID này?")){

let idToDelete = item.id;

// ⭐ xóa toàn bộ dòng cùng ID

exportedData =
exportedData.filter(
x => x.id !== idToDelete
);

localStorage.setItem(
"DATA_EXPORTED",
JSON.stringify(exportedData)
);

renderExport(exportedData);

}

};

delCell.appendChild(btn);

}

});

let list = renderData || exportedData;

// lấy ID không trùng
let uniqueIDs = [...new Set(list.map(x => x.id))];

// tạo dòng tổng nếu chưa có
let totalText =
document.getElementById("totalExport");

if(!totalText){

let h3 = document.createElement("h3");

h3.id = "totalExport";

document.getElementById("exportTable")
.parentElement
.parentElement
.insertBefore(
h3,
document.getElementById("exportTable")
.parentElement
);

totalText = h3;

}

totalText.innerText =
"Tổng thùng: " + uniqueIDs.length;

}
	
// ============================
// FILTER DATE
// ============================

function filterExportByDate(){

let from=
document.getElementById("exportFromDate").value;

let to=
document.getElementById("exportToDate").value;

if(!from||!to){

alert("Chọn ngày");

return;

}


// chỉnh ngày cuối

let fromDate=new Date(from);

let toDate=new Date(to);

toDate.setHours(23,59,59,999);

let filtered=exportedData.filter(x=>{

let d=new Date(x.date);

return d>=fromDate
&&
d<=toDate;

});

renderExport(filtered);

}

function applyExportFilter(){

let filtered = exportedData.filter(x=>{

return (

(!filterID || x.id.toLowerCase().includes(filterID)) &&

(!filterTEN || x.ten.toLowerCase().includes(filterTEN)) &&

(!filterMA || x.ma.toLowerCase().includes(filterMA))

);

});

renderExport(filtered);

}

// ============================
// FILTER IMPORT DATE
// ============================

function filterImportByDate(){

let from =
document.getElementById("importFromDate").value;

let to =
document.getElementById("importToDate").value;

if(!from || !to){

alert("Chọn ngày");

return;

}

let fromDate = new Date(from);

let toDate = new Date(to);

toDate.setHours(23,59,59,999);

let filtered = importedData.filter(x=>{

let d = new Date(x.date);

return d >= fromDate
&&
d <= toDate;

});

renderImport(filtered);

}

// ============================
// EXPORT EXCEL
// ============================

function exportExcel(){

let ws=
XLSX.utils.table_to_sheet(
document.getElementById("exportTable")
);

let wb=
XLSX.utils.book_new();

XLSX.utils.book_append_sheet(
wb,
ws,
"DATA"
);

XLSX.writeFile(
wb,
"export_data.xlsx"
);

}

function exportImportExcel(){

let table=
document.getElementById("importTable");

if(!table){

alert("Không có bảng dữ liệu nhập");

return;

}

function createFullForm(row,container){

let box=document.createElement("div");

box.className="printLabel mixLabel";

let top=document.createElement("div");
top.style.display="flex";
top.style.flex="0";

new QRCode(qrDiv,{
text:row.ID,

});

qrDiv.style.marginRight="6px";

info.className="labelTable";

let tenText = row.TEN || "";

let tenFontSize = 15;

if(tenText.length > 25) tenFontSize = 13;
if(tenText.length > 35) tenFontSize = 12;
if(tenText.length > 45) tenFontSize = 11;
if(tenText.length > 55) tenFontSize = 10;

info.innerHTML=`

<tr>

<td colspan="2"
style="
font-size:16px;
font-weight:bold;
letter-spacing:1px;
">
${row.ID}
</td>

<td
style="
font-size:16px;
font-weight:bold;
text-align:center;
">
${row.STT}
</td>

</tr>

<tr>
<td colspan="3"
style="
font-size:${tenFontSize}px;
font-weight:normal;
word-break:break-word;
white-space:normal;
height:32px;
">
${tenText}
</td>
</tr>

<tr>
<td colspan="3"

font-size:13px;
font-weight:bold;
letter-spacing:0.5px;
">
${row.MA||""}
</td>
</tr>

`;

top.appendChild(qrDiv);
top.appendChild(info);


// ===== SIZE FULL WIDTH =====

sizeTable.className="labelTable";

sizeTable.style.flex="1";   // ⭐ thêm dòng này

);

groups.forEach((g,index)=>{

    html+="<td><b>SIZE</b></td>";

    html+="<td></td>";
}

g.forEach(s=>{

html+=`<td style="font-size:14px;">
${s}
</td>`;

});

html+="</tr>";


// ===== QTY row =====

html+="<tr>";

// chỉ hiện chữ QTY ở 2 dòng đầu
if(index < 2){
    html+="<td><b>QTY</b></td>";
}else{
    html+="<td></td>";
}

g.forEach(s=>{

html+=`<td style="font-size:16px;font-weight:bold;">
${v(row[s])}
</td>`;

});

html+="</tr>";

});
sizeTable.innerHTML=html;

// ===== DÒNG KG =====

if(row["KG"]){

html += `
<tr>
<td><b>KG</b></td>
<td colspan="5"
style="font-size:14px;font-weight:bold;">
${row["KG"]}
</td>
</tr>
`;

}

// ===== DÒNG NGÀY =====

if(row["NGÀY"] && String(row["NGÀY"]).trim() !== ""){

html += `
<tr>
<td colspan="6"
style="
font-size:20px;
font-weight:bold;
text-align:center;

background:#d0d0d0;   /* nền xám */
border:2px solid black; /* viền dày */

letter-spacing:1px;  /* chữ thoáng */
padding:6px;
">
${row["NGÀY"]}
</td>
</tr>
`;
}

// ⭐ cập nhật bảng sau cùng
sizeTable.innerHTML = html;

box.appendChild(top);
box.appendChild(sizeTable);

container.appendChild(box);

}

)

]

})

);

}

infoRows.push(

new TableRow({

children:cells

})

);

}

let infoTable=
new Table({

rows:infoRows

});

// ===== QR + INFO ngang =====

let topTable=
new Table({

rows:[

new TableRow({

children:[

new TableCell({

children:[
new Paragraph({
children:[qrImage]
})
]

}),

new TableCell({

children:[
infoTable
]

})

]

})

]

});

// ===== SIZE TABLE =====

let tables =
label.querySelectorAll(".labelTable");

let sizeHTML =
tables.length>1
? tables[1]
: null;

let sizeRows=[];

if(sizeHTML){

for(let r=0;r<sizeHTML.rows.length;r++){

let cells=[];

for(let c=0;c<
sizeHTML.rows[r].cells.length;
c++){

cells.push(

new TableCell({

width:{
size:550,
type:"dxa"
},

children:[

new Paragraph(
sizeHTML.rows[r]
.cells[c]
.innerText
)

]

})

);

}

sizeRows.push(

new TableRow({

children:cells

})

);

}

}

let sizeTable=
new Table({

rows:
sizeRows.length
? sizeRows
: [

new TableRow({

children:[

new TableCell({

children:[

new Paragraph("")

]

})

]

})

]

});

// ===== MAIN TABLE =====

let mainTable=
new Table({

rows:[

new TableRow({

children:[

new TableCell({

children:[
topTable
]

})

]

}),

new TableRow({

children:[

new TableCell({

children:[
sizeTable
]

})

]

})

]

});

children.push(mainTable);

// ===== PAGE BREAK =====

children.push(

new Paragraph({
pageBreakBefore:true
})

);

}

// ===== CREATE DOC =====

let doc=
new Document({

sections:[{

children:children

}]

});

let blob=
await Packer.toBlob(doc);

let a=
document.createElement("a");

a.href=
URL.createObjectURL(blob);

a.download="QR_labels.docx";

a.click();

}

today.getMinutes()
- today.getTimezoneOffset()
);

// format yyyy-mm-dd

today.toISOString().split("T")[0];

exportFrom.value = todayStr;

document.getElementById("importFromDate");
